<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>錯字搜查隊 - 雙模式版</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 html2pdf.js 用於成績單 PDF 下載 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        /* 載入字體 */
        @import url('https://fonts.cdnfonts.com/css/iansui');
        
        :root {
            /* 定義遊戲文字縮放變數，預設 1.0 */
            --game-font-scale: 1.0;
        }

        body {
            font-family: 'Iansui', '標楷體', sans-serif;
            background: linear-gradient(135deg, #E0F2F1 0%, #B2DFDB 100%);
            overscroll-behavior: none;
            -webkit-user-select: none; /* 禁止選取文字，避免誤觸 */
            user-select: none;
            height: 100vh;
            overflow: hidden; /* 防止 Body 捲動 */
        }

        /* 遊戲主卡片樣式 */
        .card {
            background-color: white;
            border-radius: 24px;
            padding: 1.5rem; 
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
            width: 95%;
            max-width: 850px;
            border: 4px solid #4DB6AC;
            height: 85vh; 
            max-height: 800px;
            display: flex;
            flex-direction: column;
            overflow-y: auto; 
            -webkit-overflow-scrolling: touch;
            position: relative; 
        }

        /* 螢幕切換 */
        .screen {
            display: none;
            width: 100%;
            height: 100%;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        .screen.active {
            display: flex;
        }

        /* 按鈕樣式 */
        .btn {
            padding: 0.8rem 1.2rem; 
            border-radius: 16px;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.1s ease;
            box-shadow: 0 4px 0px rgba(0, 0, 0, 0.15);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            touch-action: manipulation;
        }
        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 rgba(0, 0, 0, 0.15);
        }
        .btn-primary { background-color: #26A69A; color: white; }
        .btn-secondary { background-color: #CFD8DC; color: #37474F; }
        .btn-warning { background-color: #FFB74D; color: #5D4037; }
        .btn-danger { background-color: #EF5350; color: white; }
        .btn-sm { padding: 0.5rem 1rem; font-size: 1rem; border-radius: 10px; }

        .select-style {
            width: 100%;
            padding: 0.5rem 1rem;
            border-radius: 12px;
            border: 2px solid #80CBC4;
            background-color: #F8F8F8;
            font-size: 1.1rem;
            height: 3rem;
        }

        /* 選項群組 (Radio Group) */
        .radio-group {
            display: flex;
            gap: 1rem;
            justify-content: center;
            width: 100%;
        }
        .radio-label {
            background: #F1F8E9;
            border: 2px solid #AED581;
            padding: 0.8rem; 
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            flex: 1;
            text-align: center;
            font-weight: bold;
            color: #558B2F;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .radio-label input { display: none; }
        .radio-label.checked {
            background: #26A69A;
            color: white;
            border-color: #00796B;
            box-shadow: 0 4px 0 #00695C;
        }
        .radio-label:hover:not(.checked) { background: #DCEDC8; }

        /* 遊戲標題與 Header */
        #gameHeader {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-bottom: 0.5rem;
            min-height: 3rem;
            flex-shrink: 0; 
        }
        #gameTitle {
            text-align: center;
            font-size: 2rem;
            font-weight: bold;
            color: #00897B;
            flex: 1;
        }
        #livesContainer {
            display: flex;
            justify-content: flex-start;
            visibility: hidden; 
            width: 120px;
        }
        #livesContainer span { font-size: 1.8rem; margin-right: 2px; }
        
        .menu-btn-container {
            width: 120px;
            display: flex;
            justify-content: flex-end;
        }

        #centralInstruction {
            font-size: 1.2rem;
            color: #4DB6AC;
            font-weight: 600;
            margin-bottom: 0.5rem;
            min-height: 1.8rem;
            flex-shrink: 0;
        }

        /* 詞語挑戰區 - 應用字體縮放變數 */
        .word-container {
            background-color: #E8F5E9;
            border-radius: 16px;
            padding: 2rem 1rem;
            font-size: calc(3rem * var(--game-font-scale));
            text-align: center;
            letter-spacing: 0.15em;
            position: relative;
            margin-bottom: 1rem;
            width: 100%;
            transition: font-size 0.2s;
        }
        .word-placeholder {
            display: inline-block;
            min-width: 1.5em; 
            border-bottom: 4px solid #4DB6AC;
            margin: 0 0.2em;
            color: #4CAF50;
            font-weight: bold;
            line-height: 1;
        }
        
        /* 報讀按鈕樣式 */
        .speaker-icon {
            font-size: 1.5rem; 
            width: 2.8rem; 
            height: 2.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #26A69A;
            cursor: pointer;
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(255,255,255,0.95);
            border-radius: 50%;
            border: 2px solid #B2DFDB;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            z-index: 10;
            transition: transform 0.1s;
        }
        .speaker-icon:active { transform: scale(0.9); }

        .options-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-top: 0.5rem;
            width: 100%;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }
        .option-btn {
            padding: 1rem 0.5rem;
            font-size: calc(2rem * var(--game-font-scale));
            border-radius: 16px;
            background-color: #F1F8E9;
            border: 3px solid #AED581;
            color: #33691E;
            cursor: pointer;
            transition: transform 0.1s, font-size 0.2s;
            box-shadow: 0 4px 0 #8BC34A;
        }
        .option-btn:active { transform: translateY(4px); box-shadow: 0 0 0 #8BC34A; }
        
        .option-btn.correct { background-color: #C8E6C9; border-color: #4CAF50; color: #2E7D32; box-shadow: none; transform: translateY(4px); }
        .option-btn.wrong { background-color: #FFCDD2; border-color: #E57373; color: #C62828; animation: shake 0.4s ease; }
        .option-btn.disabled-btn { opacity: 0.6; cursor: default; box-shadow: none; transform: none; }
        .option-btn.selected-exam { background-color: #4DB6AC; color: white; border-color: #00897B; box-shadow: inset 0 2px 4px rgba(0,0,0,0.2); transform: translateY(4px); }

        /* 句子糾錯區 - 應用字體縮放變數 */
        .sentence-container {
            font-size: calc(2rem * var(--game-font-scale));
            line-height: 1.8;
            background-color: #E8F5E9;
            border-radius: 16px;
            padding: 2rem 4rem 2rem 2rem;
            cursor: default;
            position: relative;
            text-align: justify;
            transition: font-size 0.2s;
        }
        .sentence-char {
            cursor: pointer;
            padding: 0.1em;
            margin: 0 0.02em;
            border-radius: 8px;
            transition: background-color 0.2s;
            display: inline-block;
            -webkit-tap-highlight-color: rgba(0,0,0,0);
        }
        .sentence-char:hover { background-color: #C8E6C9; }
        
        .sentence-char.exam-editing { background-color: #FFECB3; border-bottom: 3px solid #FF9800; }
        .sentence-char.exam-modified { color: #1565C0; font-weight: bold; text-decoration: underline; }
        .sentence-char.flash-green-shake { color: #4CAF50; animation: flash-green-shake-anim 0.8s ease; }
        .sentence-char.selected-error { color: #D32F2F; font-weight: bold; background-color: #FFEBEE; border: 2px dashed #EF5350; }
        .sentence-char.challenge-corrected { color: #4CAF50; font-weight: bold; }

        /* 修正視窗 */
        #correction-modal, #settings-modal {
            display: none;
            background: white;
            border: 4px solid #4DB6AC;
            border-radius: 20px;
            padding: 1.5rem;
            box-shadow: 0 0 0 100vw rgba(0,0,0,0.5);
            z-index: 1000;
            width: 90%;
            max-width: 450px;
            position: fixed;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        #correction-modal { top: 30%; }
        #settings-modal { top: 50%; }

        #correction-input {
            width: 100%;
            font-size: 3rem;
            text-align: center;
            border: 3px solid #B2DFDB;
            border-radius: 12px;
            padding: 0.5rem;
            margin-bottom: 1rem;
            background-color: #FAFAFA;
        }
        #correction-input:focus { outline: none; border-color: #26A69A; background-color: #fff; }

        .close-modal-x {
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 2rem;
            color: #aaa;
            cursor: pointer;
            font-weight: bold;
            line-height: 1;
        }
        .close-modal-x:hover { color: #666; }

        /* 結算畫面 */
        #errorReviewContainer {
            width: 100%;
            margin-top: 1rem;
            padding: 0.5rem 1rem;
            background-color: #F8F8F8;
            border-radius: 16px;
            overflow-y: auto;
            flex: 1; 
            text-align: left;
            -webkit-overflow-scrolling: touch;
            min-height: 100px;
        }
        .badge {
            display: inline-block; padding: 0.3em 0.6em; font-size: 0.9rem; font-weight: 700;
            border-radius: 0.4rem; margin-right: 0.5rem; color: white;
        }
        .badge-success { background-color: #4CAF50; }
        .badge-danger { background-color: #EF5350; }

        /* 訊息彈窗 */
        #message-box {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.6); z-index: 2000;
            justify-content: center; align-items: center; padding: 20px;
        }
        #message-box.active { display: flex; }
        #message-box .card { width: 100%; max-width: 400px; text-align: center; padding: 2rem; height: auto; }

        .info-text { font-size: 1.2rem; font-weight: bold; color: #757575; }

        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
        @keyframes flash-green-shake-anim {
            0% { transform: translateX(0); color: inherit; } 10% { color: #4CAF50; }
            25% { transform: translateX(-8px); color: #4CAF50; } 75% { transform: translateX(8px); color: #4CAF50; }
            100% { transform: translateX(0); color: inherit; }
        }

        /* PDF 樣式 */
        .pdf-report-container { font-family: 'Iansui', '標楷體', sans-serif; }

    </style>
</head>
<body class="flex items-center justify-center min-h-screen relative bg-gray-100">
<style id="lesson-home-link-style">
    .lesson-home-link {
        position: fixed;
        top: 14px;
        left: 14px;
        z-index: 9999;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 44px;
        padding: 0 16px;
        border-radius: 999px;
        background: #ffffff;
        color: #155e63;
        border: 2px solid #2f8f8a;
        box-shadow: 0 6px 16px rgba(0, 0, 0, 0.18);
        font-family: "Microsoft JhengHei", "Noto Sans TC", sans-serif;
        font-size: 1rem;
        font-weight: 700;
        text-decoration: none;
    }
    .lesson-home-link:focus,
    .lesson-home-link:hover {
        background: #e6fffb;
        outline: 3px solid rgba(47, 143, 138, 0.25);
    }
</style>
<a class="lesson-home-link" href="../index.html" aria-label="Back to lesson selector">&#x9078;&#x8AB2;&#x9996;&#x9801;</a>

    <!-- 1. 首頁 (Home) -->
    <div id="mainScreen" class="screen active">
        <div class="card">
            <!-- 設定按鈕 -->
            <button onclick="openSettingsModal()" class="absolute top-4 right-4 text-gray-400 hover:text-teal-600 transition" title="設定">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>
            </button>

            <div class="flex flex-col h-full justify-between items-center py-2">
                <!-- 標題 -->
                <h1 class="text-4xl md:text-5xl font-bold text-teal-700 tracking-wider mt-2">錯字搜查隊</h1>
                
                <!-- 範圍 -->
                <div class="bg-teal-50 rounded-xl p-2 w-full border border-teal-100 mt-2">
                    <h2 id="gameRangeDisplay" class="text-lg md:text-xl font-bold text-gray-700 text-center">範圍：南一五上第十二課：漫遊詩情</h2>
                </div>

                <!-- 姓名輸入 -->
                <div class="w-full max-w-md mx-auto">
                    <label for="studentName" class="block text-gray-700 font-bold mb-1 text-lg text-left pl-2">請輸入姓名：</label>
                    <input type="text" id="studentName" class="w-full p-2 border-2 border-teal-300 rounded-xl focus:outline-none focus:border-teal-500 text-xl text-center bg-gray-50 shadow-inner" placeholder="例如：王小明">
                </div>

                <!-- 模式選擇 -->
                <div class="w-full max-w-md mx-auto">
                    <p class="text-gray-700 font-bold mb-1 text-lg text-left pl-2">選擇遊戲模式：</p>
                    <div class="radio-group">
                        <label class="radio-label checked" onclick="selectMechanic('challenge')">
                            <input type="radio" name="mechanic" value="challenge" checked>
                            <div class="text-2xl mb-1">🏰</div>
                            <div class="text-lg">闖關挑戰</div>
                            <span class="text-xs font-normal opacity-80">(三顆心)</span>
                        </label>
                        <label class="radio-label" onclick="selectMechanic('exam')">
                            <input type="radio" name="mechanic" value="exam">
                            <div class="text-2xl mb-1">📝</div>
                            <div class="text-lg">試卷測驗</div>
                            <span class="text-xs font-normal opacity-80">(交卷制)</span>
                        </label>
                    </div>
                </div>

                <!-- 開始按鈕 -->
                <button onclick="checkNameAndStart()" class="btn btn-primary w-full max-w-md mx-auto text-xl shadow-lg">進入選單</button>

                <!-- 下載區 -->
                <div class="w-full max-w-md mx-auto border-t border-teal-100 pt-2 mt-2">
                    <button onclick="generateWorksheet(this)" class="btn btn-secondary w-full text-base py-2 bg-teal-50 text-teal-700 hover:bg-teal-100 border-teal-200 shadow-sm hover:shadow">
                        📄 下載 Word 學習單 (A4題目+解答)
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 設定視窗 -->
    <div id="settings-modal">
        <span class="close-modal-x" onclick="closeSettingsModal()">✕</span>
        <h2 class="text-2xl font-bold text-gray-700 mb-4 text-center">⚙️ 設定</h2>
        
        <div class="bg-gray-50 p-4 rounded-xl border border-gray-200 mb-6 text-left">
            <div class="flex items-center justify-between mb-3">
                <span class="text-lg font-bold text-gray-600">🔊 語音設定</span>
                <label class="flex items-center cursor-pointer">
                    <input type="checkbox" id="enableSpeech" class="form-checkbox h-5 w-5 text-teal-600 rounded" checked onchange="updateVoiceSettings()">
                    <span class="ml-2 text-gray-700 font-bold">開啟報讀</span>
                </label>
            </div>
            <select id="voiceSelect" class="select-style w-full border-gray-300 mb-3 h-10 py-1 text-base"></select>
            <div class="flex items-center bg-gray-100 rounded-lg p-2 mb-3">
                <span class="text-sm font-bold text-gray-500 mr-2">語速</span>
                <input type="range" id="rateRange" min="0.5" max="2.0" step="0.1" value="1.0" class="flex-1 accent-teal-600" onchange="updateRateLabel()">
                <span id="rateLabel" class="text-sm font-bold text-gray-500 ml-2 w-8">1.0</span>
            </div>

            <hr class="border-gray-300 my-3">

            <!-- 字體大小 -->
            <div class="mb-3">
                <div class="flex items-center justify-between mb-1">
                    <span class="text-lg font-bold text-gray-600">🔠 字體大小</span>
                    <span id="fontScaleLabel" class="text-sm font-bold text-teal-600">1.0x</span>
                </div>
                <div class="flex items-center bg-gray-100 rounded-lg p-2">
                    <span class="text-xs mr-2">小</span>
                    <input type="range" id="fontScaleRange" min="0.8" max="1.5" step="0.1" value="1.0" class="flex-1 accent-teal-600" oninput="updateFontScale()">
                    <span class="text-xs ml-2">大</span>
                </div>
                <div class="text-center mt-2 p-2 bg-white rounded border border-gray-200">
                    <span class="text-gray-500 text-sm">預覽：</span>
                    <span id="fontPreviewText" class="font-bold text-teal-700">閱讀與寫作</span>
                </div>
            </div>

            <button onclick="testVoice('這是報讀測試語音')" class="btn btn-sm btn-secondary w-full">🔊 試聽語音</button>
        </div>

        <button onclick="closeSettingsModal()" class="btn btn-primary w-full text-lg">完成</button>
    </div>

    <!-- 2. 主選單 -->
    <div id="modeScreen" class="screen">
        <div class="card text-center items-center justify-center">
            <h2 class="text-3xl font-bold mb-2 text-gray-700">選擇題型</h2>
            <p id="welcomeMsg" class="text-xl text-teal-600 font-bold mb-6"></p>
            <div id="modeDescription" class="mb-6 p-3 bg-yellow-50 text-yellow-800 rounded-lg font-bold w-full max-w-md"></div>
            
            <div class="grid grid-cols-1 gap-6 w-full max-w-md mx-auto mb-8">
                <button onclick="selectGameType('word')" class="btn btn-primary text-2xl py-6 rounded-2xl shadow-md border-b-4 border-teal-800">
                    📖 詞語填空
                </button>
                <button onclick="selectGameType('sentence')" class="btn btn-primary text-2xl py-6 rounded-2xl shadow-md border-b-4 border-teal-800">
                    ✍️ 句子改錯
                </button>
            </div>
            
            <button onclick="showScreen('mainScreen')" class="btn btn-secondary w-full max-w-md">回到首頁</button>
        </div>
    </div>

    <!-- 3. 遊戲中 -->
    <div id="gameScreen" class="screen">
        <div class="card relative flex flex-col h-full">
            <div id="gameHeader">
                <div id="livesContainer"><span>❤️</span><span>❤️</span><span>❤️</span></div>
                <h2 id="gameTitle" class="truncate px-2"></h2>
                <div class="menu-btn-container">
                    <button onclick="showScreen('modeScreen')" class="btn btn-sm btn-secondary font-bold">🏠 選單</button>
                </div>
            </div>
            
            <p id="centralInstruction" class="text-center"></p>

            <div class="flex justify-between items-center mb-2 px-2 flex-shrink-0">
                <div id="progressContainer" class="info-text">1 / 10</div>
                <div id="timerContainer" class="info-text">00:00</div>
            </div>

            <div class="flex-1 flex flex-col justify-center items-center w-full overflow-y-auto min-h-0">
                <!-- 詞語模式 -->
                <div id="wordModeContainer" style="display: none; width: 100%;">
                    <div id="wordContainer" class="word-container"></div>
                    <div id="optionsGrid" class="options-grid"></div>
                </div>

                <!-- 句子模式 -->
                <div id="sentenceModeContainer" style="display: none; width: 100%;">
                    <div id="sentenceContainer" class="sentence-container"></div>
                </div>
            </div>

            <!-- 修正輸入彈窗 -->
            <div id="correction-modal">
                <span class="close-modal-x" onclick="closeCorrectionModal()">✕</span>
                <h3 class="text-xl font-bold text-gray-700 mb-4 text-center">請輸入正確的字</h3>
                <input type="text" id="correction-input" maxlength="1" autocomplete="off">
                <div class="flex gap-4">
                    <button id="correction-cancel" class="btn btn-secondary flex-1 text-lg py-3 hidden">取消</button>
                    <button id="correction-confirm" class="btn btn-primary flex-1 text-lg py-3">確定</button>
                </div>
            </div>

            <div id="gameFooter" class="mt-auto pt-2 border-t flex space-x-3 justify-center flex-shrink-0">
                <div id="challengeControls" class="w-full flex gap-3 hidden">
                    <button onclick="prevQuestion()" id="btnChallengePrev" class="btn btn-secondary flex-1">⬅️ 上一題</button>
                    <button onclick="nextQuestion()" id="btnChallengeNext" class="btn btn-secondary flex-1">下一題 ➡️</button>

    <script>
        const synth = window.speechSynthesis;
        const speechUtterance = new SpeechSynthesisUtterance();

        // Helper function to shuffle an array (used for options)
        function shuffleArray(array) {
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }
        const QUESTIONS_DB = {
            word: [
                { id: 'w1', q: "鳥[]澗", options: shuffleArray(["綿", "鳴", "慵"]), a: "鳴", full: "鳥鳴澗" },

                { id: 'w7', q: "[]寫", options: shuffleArray(["掠", "描", "谙"]), a: "描", full: "描寫" },
                { id: 'w8', q: "[]惱", options: shuffleArray(["鳩", "煩", "楼"]), a: "煩", full: "煩惱" },
                { id: 'w9', q: "[]銳", options: shuffleArray(["捩", "敏", "矫"]), a: "敏", full: "敏銳" },
                { id: 'w10', q: "敏[]", options: shuffleArray(["險", "銳", "賤"]), a: "銳", full: "敏銳" },
                { id: 'w11', q: "白帝[]", options: shuffleArray(["徊", "城", "钝"]), a: "城", full: "白帝城" },
                { id: 'w12', q: "[]典", options: shuffleArray(["蘑", "辭", "孽"]), a: "辭", full: "辭典" },
                { id: 'w13', q: "[]聲", options: shuffleArray(["椴", "猿", "媷"]), a: "猿", full: "猿聲" },
                { id: 'w14', q: "[]叫", options: shuffleArray(["棉", "啼", "筚"]), a: "啼", full: "啼叫" },
                { id: 'w15', q: "輕[]", options: shuffleArray(["讲", "舟", "牝"]), a: "舟", full: "輕舟" },
                { id: 'w16', q: "獲[]", options: shuffleArray(["据", "赦", "豉"]), a: "赦", full: "獲赦" },
                { id: 'w17', q: "[]心似箭", options: shuffleArray(["醬", "歸", "贅"]), a: "歸", full: "歸心似箭" },
                { id: 'w18', q: "歸心似[]", options: shuffleArray(["慰", "箭", "頡"]), a: "箭", full: "歸心似箭" }
            ],
            sentence: [
                { id: 's1', q: "生活中遇到鳥綿澗時，我會多注意。", wrong: "綿", a: "鳴", full: "生活中遇到鳥鳴澗時，我會多注意。" },
                { id: 's2', q: "今天上課時，老師分享了鳥鳴潔的故事。", wrong: "潔", a: "澗", full: "今天上課時，老師分享了鳥鳴澗的故事。" },
                { id: 's3', q: "我和家人聊到崃花，覺得很有趣。", wrong: "崃", a: "桂", full: "我和家人聊到桂花，覺得很有趣。" },
                { id: 's4', q: "這張照片裡的匽靜吸引了大家的目光。", wrong: "匽", a: "幽", full: "這張照片裡的幽靜吸引了大家的目光。" },
                { id: 's5', q: "生活中遇到鬆繞時，我會多注意。", wrong: "鬆", a: "繚", full: "生活中遇到繚繞時，我會多注意。" },
                { id: 's6', q: "今天上課時，老師分享了痱人的故事。", wrong: "痱", a: "詩", full: "今天上課時，老師分享了詩人的故事。" },
                { id: 's7', q: "我和家人聊到掠寫，覺得很有趣。", wrong: "掠", a: "描", full: "我和家人聊到描寫，覺得很有趣。" },
                { id: 's8', q: "這張照片裡的鳩惱吸引了大家的目光。", wrong: "鳩", a: "煩", full: "這張照片裡的煩惱吸引了大家的目光。" },
                { id: 's9', q: "生活中遇到捩銳時，我會多注意。", wrong: "捩", a: "敏", full: "生活中遇到敏銳時，我會多注意。" },
                { id: 's10', q: "今天上課時，老師分享了敏險的故事。", wrong: "險", a: "銳", full: "今天上課時，老師分享了敏銳的故事。" },
                { id: 's11', q: "我和家人聊到白帝徊，覺得很有趣。", wrong: "徊", a: "城", full: "我和家人聊到白帝城，覺得很有趣。" },
                { id: 's12', q: "這張照片裡的蘑典吸引了大家的目光。", wrong: "蘑", a: "辭", full: "這張照片裡的辭典吸引了大家的目光。" },
                { id: 's13', q: "生活中遇到椴聲時，我會多注意。", wrong: "椴", a: "猿", full: "生活中遇到猿聲時，我會多注意。" },
                { id: 's14', q: "今天上課時，老師分享了棉叫的故事。", wrong: "棉", a: "啼", full: "今天上課時，老師分享了啼叫的故事。" },
                { id: 's15', q: "我和家人聊到輕讲，覺得很有趣。", wrong: "讲", a: "舟", full: "我和家人聊到輕舟，覺得很有趣。" },
                { id: 's16', q: "這張照片裡的獲据吸引了大家的目光。", wrong: "据", a: "赦", full: "這張照片裡的獲赦吸引了大家的目光。" },
                { id: 's17', q: "生活中遇到醬心似箭時，我會多注意。", wrong: "醬", a: "歸", full: "生活中遇到歸心似箭時，我會多注意。" },
                { id: 's18', q: "今天上課時，老師分享了歸心似慰的故事。", wrong: "慰", a: "箭", full: "今天上課時，老師分享了歸心似箭的故事。" }
            ]
        };

        const gameState = {
            studentName: '',
            mechanic: 'challenge',
            gameType: 'word',
            questions: [],
            currentIndex: 0,
            lives: 3,
            startTime: null,
            userAnswers: [],
            results: [],
            isLocked: false,
            enableSpeech: true,
            currentSelectedSpan: null
        };

        let timerInterval;

        function openSettingsModal() { document.getElementById('settings-modal').style.display = 'block'; }
        function closeSettingsModal() { document.getElementById('settings-modal').style.display = 'none'; }
        function updateVoiceSettings() { gameState.enableSpeech = document.getElementById('enableSpeech').checked; }
        function updateRateLabel() { document.getElementById('rateLabel').textContent = document.getElementById('rateRange').value; }
        function updateFontScale() {
            const scale = document.getElementById('fontScaleRange').value;
            document.getElementById('fontScaleLabel').textContent = scale + 'x';
            document.documentElement.style.setProperty('--game-font-scale', scale);
            document.getElementById('fontPreviewText').style.fontSize = `calc(1.5rem * ${scale})`;
        }
        function testVoice(text) { updateVoiceSettings(); speak(text); }

        function selectMechanic(mech) {
            gameState.mechanic = mech;
            document.querySelectorAll('.radio-label').forEach(el => el.classList.remove('checked'));
            document.querySelector(`input[value="${mech}"]`).parentElement.classList.add('checked');
        }

        function checkNameAndStart() {
            const name = document.getElementById('studentName').value.trim();
            if (!name) { alertMsg("請先輸入姓名喔！"); return; }
            gameState.studentName = name;
            document.getElementById('welcomeMsg').textContent = `${name}同學，你好！`;
            const mechText = gameState.mechanic === 'challenge' ? '🏰 闖關模式 (答錯扣血)' : '📝 測驗模式 (自由作答)';
            document.getElementById('modeDescription').textContent = `目前模式：${mechText}`;
            showScreen('modeScreen');
        }

        function selectGameType(type) {
            gameState.gameType = type;
            restartGame();
        }

        function restartGame(isReview = false) {
            let qs = [];
            if (isReview) {
                const wrongIndices = [];
                for (let i = 0; i < gameState.questions.length; i++) {
                    let isWrong = false;
                    if (gameState.mechanic === 'challenge') {
                        const res = gameState.results[i];
                        if (!res || !res.passedOnFirstTry) isWrong = true;
                    } else {
                        const ans = gameState.userAnswers[i];
                        if (ans) {
                            const q = gameState.questions[i];
                            let isCorrect = gameState.gameType === 'word' ? (ans.userAnswer === q.a) : (ans.userAnswer === q.a && q.q[ans.charIndex] === q.wrong);
                            if (!isCorrect) isWrong = true;
                        } else isWrong = true;
                    }
                    if (isWrong) wrongIndices.push(i);
                }
                if (wrongIndices.length === 0) { alertMsg("沒有錯題！"); return; }
                qs = wrongIndices.map(i => gameState.questions[i]);
            } else {
                qs = [...QUESTIONS_DB[gameState.gameType]].sort(() => 0.5 - Math.random());
            }

            gameState.questions = qs;
            gameState.currentIndex = 0;
            gameState.lives = 3;
            gameState.startTime = new Date();
            gameState.isLocked = false;
            if (gameState.mechanic === 'exam') gameState.userAnswers = new Array(qs.length).fill(null);
            else gameState.results = [];

            showScreen('gameScreen');
            updateUIForMechanic();
            renderQuestion();
            clearInterval(timerInterval);
            timerInterval = setInterval(updateTimer, 1000);
        }

        function updateUIForMechanic() {
            const isChallenge = gameState.mechanic === 'challenge';
            document.getElementById('livesContainer').style.visibility = isChallenge ? 'visible' : 'hidden';
            updateLivesUI();
            document.getElementById('challengeControls').classList.toggle('hidden', !isChallenge);
            document.getElementById('examControls').classList.toggle('hidden', isChallenge);
            document.getElementById('correction-cancel').classList.toggle('hidden', isChallenge);
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            window.scrollTo(0,0);
        }

        function updateTimer() {
            const diff = Math.floor((new Date() - gameState.startTime) / 1000);
            const m = String(Math.floor(diff/60)).padStart(2,'0');
            const s = String(diff%60).padStart(2,'0');
            document.getElementById('timerContainer').textContent = `${m}:${s}`;
        }

        function renderQuestion() {
            const total = gameState.questions.length;
            const idx = gameState.currentIndex;
            if (idx >= total) { finishGame(); return; }
            const q = gameState.questions[idx];
            document.getElementById('progressContainer').textContent = `${idx + 1} / ${total}`;
            document.getElementById('gameTitle').textContent = gameState.gameType === 'word' ? '詞語填空' : '句子改錯';
            const instruction = document.getElementById('centralInstruction');
            if (gameState.mechanic === 'exam') {
                instruction.textContent = gameState.gameType === 'word' ? '請點選答案 (可修改)' : '請點選錯字並修正';
                document.getElementById('btnPrev').disabled = (idx === 0);
                document.getElementById('btnNext').classList.toggle('hidden', idx === total-1);
                document.getElementById('btnSubmit').classList.toggle('hidden', idx !== total-1);
            } else {
                instruction.textContent = gameState.gameType === 'word' ? '請選擇正確答案' : '請找出錯字';
                document.getElementById('btnChallengePrev').disabled = (idx === 0);
                document.getElementById('btnChallengeNext').classList.toggle('hidden', idx === total-1);
                document.getElementById('btnChallengeSubmit').classList.toggle('hidden', idx !== total-1);
            }
            if (gameState.gameType === 'word') {
                document.getElementById('wordModeContainer').style.display = 'block';
                document.getElementById('sentenceModeContainer').style.display = 'none';
                renderWordQ(q);
            } else {
                document.getElementById('wordModeContainer').style.display = 'none';
                document.getElementById('sentenceModeContainer').style.display = 'block';
                renderSentenceQ(q);
            }
        }

        function renderWordQ(q) {
            const container = document.getElementById('wordContainer');
            const grid = document.getElementById('optionsGrid');
            let ansDisplay = '';
            let isCorrect = false;
            if (gameState.mechanic === 'exam') {
                const saved = gameState.userAnswers[gameState.currentIndex];
                ansDisplay = saved ? `<span style="color:#26A69A">${saved.userAnswer}</span>` : '';
            } else {
                const res = gameState.results[gameState.currentIndex];
                if (res && res.isCorrect) { ansDisplay = `<span style="color:#4CAF50">${q.a}</span>`; isCorrect = true; }
            }
            container.innerHTML = q.q.replace('[]', `<span class="word-placeholder">${ansDisplay}</span>`);
            if (gameState.enableSpeech) {
                const icon = document.createElement('span');
                icon.className = 'speaker-icon'; icon.textContent = '🔊';
                icon.onclick = (e) => { e.stopPropagation(); speak(q.speakFull || q.full); };
                container.appendChild(icon);
            }
            grid.innerHTML = '';
            q.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn'; btn.textContent = opt;
                if (gameState.mechanic === 'exam') {
                    if (gameState.userAnswers[gameState.currentIndex]?.userAnswer === opt) btn.classList.add('selected-exam');
                    btn.onclick = () => { gameState.userAnswers[gameState.currentIndex] = {questionId: q.id, userAnswer: opt}; renderQuestion(); };
                } else {
                    if (isCorrect) {
                        btn.classList.add('disabled-btn');
                        if (opt === q.a) btn.classList.add('correct');
                        btn.disabled = true;
                    } else btn.onclick = () => handleChallengeWordSelect(q, opt, btn);
                }
                grid.appendChild(btn);
            });
        }

        function renderSentenceQ(q) {
            const container = document.getElementById('sentenceContainer');
            container.innerHTML = '';
            if (gameState.enableSpeech) {
                const icon = document.createElement('span');
                icon.className = 'speaker-icon'; icon.textContent = '🔊';
                icon.onclick = (e) => { e.stopPropagation(); speak(q.speakFull || q.full); };
                container.appendChild(icon);
            }
            let isCorrectChallenge = gameState.mechanic === 'challenge' && gameState.results[gameState.currentIndex]?.isCorrect;
            q.q.split('').forEach((char, charIdx) => {
                const span = document.createElement('span');
                span.className = 'sentence-char'; span.textContent = char;
                if (gameState.mechanic === 'exam') {
                    const saved = gameState.userAnswers[gameState.currentIndex];
                    if (saved && saved.charIndex === charIdx) { span.textContent = saved.userAnswer; span.classList.add('exam-modified'); }
                    span.onclick = () => openCorrectionModal(q, char, charIdx, span);
                } else {
                    if (isCorrectChallenge) {
                        if (char === q.wrong) { span.textContent = q.a; span.classList.add('challenge-corrected'); }
                    } else span.onclick = () => handleChallengeSentenceClick(q, char, charIdx, span);
                }
                container.appendChild(span);
            });
        }

        function handleChallengeWordSelect(q, opt, btn) {
            if (gameState.isLocked) return;
            
            const placeholder = document.querySelector('.word-placeholder');
            
            if (opt === q.a) {
                gameState.isLocked = true; btn.classList.add('correct');
                if (placeholder) {
                    placeholder.innerHTML = `<span style="color:#4CAF50">${opt}</span>`;
                    placeholder.style.borderBottom = 'none';
                }
                
                if (!gameState.results[gameState.currentIndex]) gameState.results[gameState.currentIndex] = {question:q, isCorrect:true, passedOnFirstTry:true};
                else gameState.results[gameState.currentIndex].isCorrect = true;
                if (gameState.enableSpeech) speak(q.speakFull || q.full, () => setTimeout(nextQuestionChallenge, 500));
                else setTimeout(nextQuestionChallenge, 1500);
            } else {
                btn.classList.add('wrong'); loseLife();
                if (placeholder) {
                    placeholder.innerHTML = `<span style="color:#EF5350">${opt}</span>`;
                    setTimeout(() => {
                        if (!gameState.results[gameState.currentIndex]?.isCorrect) {
                            placeholder.innerHTML = '';
                        }
                    }, 500);
                }
                if (!gameState.results[gameState.currentIndex]) gameState.results[gameState.currentIndex] = {question:q, isCorrect:false, wrongAnswer:opt, passedOnFirstTry:false};
                setTimeout(() => btn.classList.remove('wrong'), 500);
            }
        }

        function handleChallengeSentenceClick(q, char, idx, span) {
            if (gameState.isLocked) return;
            if (char === q.wrong) {
                span.classList.add('selected-error');
                openCorrectionModal(q, char, idx, span);
            } else {
                span.classList.add('flash-green-shake'); loseLife();
                if (!gameState.results[gameState.currentIndex]) gameState.results[gameState.currentIndex] = {question:q, isCorrect:false, wrongAnswer:'點錯位置', passedOnFirstTry:false};
                setTimeout(() => span.classList.remove('flash-green-shake'), 800);
            }
        }

        function nextQuestionChallenge() { gameState.currentIndex++; gameState.isLocked = false; renderQuestion(); }
        function loseLife() { gameState.lives--; updateLivesUI(); if (gameState.lives <= 0) alertMsg("愛心用完了！挑戰失敗！", () => finishGame()); }
        function prevQuestion() { if (gameState.currentIndex > 0) { gameState.currentIndex--; renderQuestion(); } }
        function nextQuestion() { if (gameState.currentIndex < gameState.questions.length - 1) { gameState.currentIndex++; renderQuestion(); } }
        function submitExam() { 
            const unanswered = gameState.userAnswers.filter(a => a === null).length;
            showConfirmBox(unanswered > 0 ? `還有 ${unanswered} 題未答，確定交卷？` : "確定交卷？", () => finishGame());
        }

        function openCorrectionModal(q, originalChar, idx, spanElement) {
            gameState.currentSelectedSpan = spanElement; 
            const modal = document.getElementById('correction-modal');
            const input = document.getElementById('correction-input');
            modal.style.display = 'block'; input.value = ''; input.focus();
            document.getElementById('correction-cancel').onclick = () => closeCorrectionModal();
            document.getElementById('correction-confirm').onclick = () => {
                const val = input.value.trim(); if (!val) return;
                if (gameState.mechanic === 'challenge') {
                    if (val === q.a) {
                        spanElement.textContent = val; spanElement.style.color = '#4CAF50'; modal.style.display = 'none';
                        if (!gameState.results[gameState.currentIndex]) gameState.results[gameState.currentIndex] = {question:q, isCorrect:true, passedOnFirstTry:true};
                        else gameState.results[gameState.currentIndex].isCorrect = true;
                        if (gameState.enableSpeech) speak(q.speakFull || q.full, () => setTimeout(nextQuestionChallenge, 500));
                        else setTimeout(nextQuestionChallenge, 1500);
                    } else {
                        input.style.animation = 'shake 0.5s ease'; loseLife();
                        if (!gameState.results[gameState.currentIndex]) gameState.results[gameState.currentIndex] = {question:q, isCorrect:false, wrongAnswer:val, passedOnFirstTry:false};
                        setTimeout(() => input.style.animation = '', 500);
                    }
                } else {
                    gameState.userAnswers[gameState.currentIndex] = {questionId: q.id, userAnswer: val, charIndex: idx};
                    modal.style.display = 'none'; renderQuestion();
                }
            };
        }

        function closeCorrectionModal() {
            document.getElementById('correction-modal').style.display = 'none';
            if (gameState.currentSelectedSpan) { gameState.currentSelectedSpan.classList.remove('selected-error'); }
        }

        function getRangeText() { return document.getElementById('gameRangeDisplay').textContent.replace('範圍：', '').trim() || '翰林五下第四課'; }

        function finishGame() {
            clearInterval(timerInterval); showScreen('resultsScreen');
            let correctCount = 0;
            const reviewContainer = document.getElementById('errorReviewContainer');
            reviewContainer.innerHTML = '';
            const reportData = gameState.questions.map((q, idx) => {
                let isCorrect = false, userVal = '未答';
                if (gameState.mechanic === 'challenge') {
                    const res = gameState.results[idx];
                    if (res && res.isCorrect) { isCorrect = true; userVal = q.a; } else userVal = res ? res.wrongAnswer : '未完成';
                } else {
                    const ans = gameState.userAnswers[idx];
                    if (ans) {
                        userVal = ans.userAnswer;
                        isCorrect = gameState.gameType === 'word' ? (ans.userAnswer === q.a) : (ans.userAnswer === q.a && q.q[ans.charIndex] === q.wrong);
                    }
                }
                if (isCorrect) correctCount++;
                return { q, isCorrect, userVal };
            });
            document.getElementById('resultsName').textContent = `姓名：${gameState.studentName}`;
            document.getElementById('resultsScore').textContent = `分數：${Math.round((correctCount/gameState.questions.length)*100)} 分 (${correctCount} / ${gameState.questions.length})`;
            document.getElementById('resultsTime').textContent = "時間：" + document.getElementById('timerContainer').textContent;
            if (correctCount === gameState.questions.length) document.getElementById('reviewErrorsBtn').classList.add('hidden');
            else {
                document.getElementById('reviewErrorsBtn').classList.remove('hidden');
                reportData.forEach((item, idx) => {
                    if (!item.isCorrect) {
                        const div = document.createElement('div'); div.className = 'border-b py-3';
                        div.innerHTML = `<div class="text-lg"><span class="badge badge-danger">錯</span> ${item.q.q}</div>
                            <div class="text-gray-600 text-sm">答：<span class="text-red-500">${item.userVal}</span> | 正：<span class="text-green-600">${item.q.a}</span></div>`;
                        reviewContainer.appendChild(div);
                    }
                });
            }
            gameState.finalReport = reportData;
        }

        function updateLivesUI() {
            const spans = document.getElementById('livesContainer').children;
            for(let i=0; i<3; i++) { spans[i].textContent = i < gameState.lives ? '❤️' : '💔'; spans[i].style.opacity = i < gameState.lives ? '1' : '0.5'; }
        }

        function alertMsg(msg, callback) {
            const box = document.getElementById('message-box');
            document.getElementById('message-box-text').textContent = msg;
            document.getElementById('message-box-cancel').classList.add('hidden');
            document.getElementById('message-box-ok').onclick = () => { box.classList.remove('active'); if (callback) callback(); };
            box.classList.add('active');
        }

        function showConfirmBox(msg, onConfirm) {
            const box = document.getElementById('message-box');
            document.getElementById('message-box-text').textContent = msg;
            document.getElementById('message-box-cancel').classList.remove('hidden');
            document.getElementById('message-box-ok').onclick = () => { box.classList.remove('active'); onConfirm(); };
            document.getElementById('message-box-cancel').onclick = () => box.classList.remove('active');
            box.classList.add('active');
        }

        function speak(text, callback = null) {
            if (!gameState.enableSpeech) { if (callback) setTimeout(callback, 1000); return; }
            if (synth.speaking) synth.cancel();
            speechUtterance.text = text;
            speechUtterance.rate = parseFloat(document.getElementById('rateRange').value);
            const v = synth.getVoices().find(voice => voice.name === document.getElementById('voiceSelect').value);
            if(v) speechUtterance.voice = v;
            speechUtterance.onend = () => { if (callback) callback(); speechUtterance.onend = null; };
            synth.speak(speechUtterance);
        }

        function initVoice() {
            const voices = synth.getVoices().filter(v => v.lang.startsWith('zh'));
            const sel = document.getElementById('voiceSelect');
            sel.innerHTML = voices.length ? '' : '<option value="">預設語音</option>';
            voices.forEach(v => { const opt = document.createElement('option'); opt.value = v.name; opt.textContent = v.name; sel.appendChild(opt); });
        }
        speechSynthesis.onvoiceschanged = initVoice;
        window.onload = () => { setTimeout(initVoice, 500); };

        function executeDownload() {
            const format = document.getElementById('downloadFormat').value;
            if (!gameState.finalReport) return;
            if (format === 'pdf') downloadPDF(); else if (format === 'csv') downloadCSV(); else downloadTXT();
        }

        function downloadCSV() {
            let content = "\uFEFF姓名,範圍,題目,作答,正解,結果\n";
            gameState.finalReport.forEach(r => content += `${gameState.studentName},${getRangeText()},"${r.q.q.replace(/"/g,'""')}",${r.userVal},${r.q.a},${r.isCorrect?'O':'X'}\n`);
            saveFile(content, 'csv', 'text/csv');
        }
        function downloadTXT() {
            let content = `成績單 - ${gameState.studentName}\n範圍：${getRangeText()}\n\n`;
            gameState.finalReport.forEach((r,i) => content += `${i+1}. ${r.q.q} [答:${r.userVal} | 正:${r.q.a}] ${r.isCorrect?'O':'X'}\n`);
            saveFile(content, 'txt', 'text/plain');
        }
        function downloadPDF() {
            const el = document.createElement('div'); el.className = 'pdf-report-container p-8 bg-white';
            el.innerHTML = `<h1 style="text-align:center;font-size:2rem;margin-bottom:1rem;">錯字搜查隊成績單</h1><p>姓名：${gameState.studentName}</p><p>範圍：${getRangeText()}</p><p>${document.getElementById('resultsScore').textContent}</p>
                <table style="width:100%;border-collapse:collapse;margin-top:1rem;"><tr style="background:#eee;"><th style="border:1px solid #ddd;padding:8px;">題目</th><th style="border:1px solid #ddd;padding:8px;">作答</th><th style="border:1px solid #ddd;padding:8px;">正解</th><th style="border:1px solid #ddd;padding:8px;">結果</th></tr>
                ${gameState.finalReport.map(r => `<tr><td style="border:1px solid #ddd;padding:8px;">${r.q.q}</td><td style="border:1px solid #ddd;padding:8px;">${r.userVal}</td><td style="border:1px solid #ddd;padding:8px;">${r.q.a}</td><td style="border:1px solid #ddd;padding:8px;">${r.isCorrect?'O':'X'}</td></tr>`).join('')}</table>`;
            document.body.appendChild(el);
            html2pdf().from(el).set({margin:10, filename:`成績單_${gameState.studentName}.pdf`, jsPDF:{format:'a4'}}).save().then(()=>document.body.removeChild(el));
        }
        function saveFile(c,e,m) { const b = new Blob([c],{type:m}), u = URL.createObjectURL(b), a = document.createElement('a'); a.href = u; a.download = `錯字搜查隊_${gameState.studentName}.${e}`; a.click(); }

        function generateWorksheet(btn) {
            const oldText = btn.textContent; btn.textContent = "⏳ 製作中..."; btn.disabled = true;
            const words = QUESTIONS_DB.word, sents = QUESTIONS_DB.sentence;
            const content = `<html><head><meta charset="utf-8"><style>body{font-family:'標楷體';}.ws-title{text-align:center;font-size:24pt;font-weight:bold;}.ws-header{font-size:14pt;border-bottom:1px solid #000;margin:20pt 0;}.ws-section{font-size:16pt;font-weight:bold;background:#f0f0f0;padding:5pt;margin-top:20pt;}.ws-q{margin:10pt 0;font-size:14pt;}.ans-table{width:100%;border-collapse:collapse;}.ans-table td,th{border:1px solid #000;padding:5pt;text-align:center;}</style></head><body>
                <div class="ws-title">錯字搜查隊 - 學習單</div><div class="ws-header"><p>範圍：${getRangeText()}</p><p>姓名：______________</p></div>
                <div class="ws-section">一、詞語填空</div>${words.map((q,i)=>`<div class="ws-q">${i+1}. ${q.q.replace('[]','______')} (${q.options.join('/')})</div>`).join('')}
                <div class="ws-section">二、句子改錯</div>${sents.map((q,i)=>`<div class="ws-q">${i+1}. ${q.q} (  )</div>`).join('')}
                <div style="page-break-before:always;"></div><div class="ws-title">解答卷</div>
                <div class="ws-section">詞語填空解答</div><table class="ans-table"><tr>${words.map((_,i)=>`<th>${i+1}</th>`).join('')}</tr><tr>${words.map(q=>`<td style="color:red">${q.a}</td>`).join('')}</tr></table>
                <div class="ws-section">句子改錯解答</div><table class="ans-table"><tr><th>題號</th><th>錯字</th><th>正解</th></tr>${sents.map((q,i)=>`<tr><td>${i+1}</td><td>${q.wrong}</td><td style="color:red">${q.a}</td></tr>`).join('')}</table></body></html>`;
            const b = new Blob(['\ufeff', content], {type: 'application/msword'});
            const u = URL.createObjectURL(b), a = document.createElement('a'); a.href = u; a.download = `學習單_${getRangeText()}.doc`; a.click();
            btn.textContent = oldText; btn.disabled = false;
        }
    </script>
</body>
</html>
