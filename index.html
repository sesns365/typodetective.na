        const ALL = "\u5168\u90e8";
        const state = { grade: ALL, query: "" };
        const gradeOrder = [ALL, "1A", "2A", "3A", "4A", "5A", "6A"];
        const gradeFilters = document.getElementById("gradeFilters");
        const lessonGroups = document.getElementById("lessonGroups");
        const visibleCount = document.getElementById("visibleCount");
        const searchInput = document.getElementById("searchInput");

        function createFilterButton(label) {
            const button = document.createElement("button");
            button.className = "chip";
            button.type = "button";
            button.textContent = label;
            button.setAttribute("aria-pressed", state.grade === label ? "true" : "false");
            button.addEventListener("click", () => {
                state.grade = label;
                render();
            });
            return button;
        }
        function renderFilters() {
            gradeFilters.replaceChildren(...gradeOrder.map(createFilterButton));
        }
        function lessonNumber(item) {
            const match = String(item.lesson).match(/\d+/);
            return match ? Number(match[0]) : 0;
        }
        function filterLessons() {
            const query = state.query.trim().toLowerCase();
            return LESSONS
                .filter(item => state.grade === ALL || item.grade === state.grade)
                .filter(item => {
                    if (!query) return true;
                    return [item.grade, item.lesson, item.title, item.code].join(" ").toLowerCase().includes(query);
                })
                .sort((a, b) => {
                    const gradeDiff = gradeOrder.indexOf(a.grade) - gradeOrder.indexOf(b.grade);
                    if (gradeDiff) return gradeDiff;
                    const lessonDiff = lessonNumber(a) - lessonNumber(b);
                    if (lessonDiff) return lessonDiff;
                    return a.title.localeCompare(b.title, "zh-Hant");
                });
        }
        function renderLessonCard(item) {
            const card = document.createElement("a");
            card.className = "lesson-card";
            card.href = encodeURI(item.path);
            const code = document.createElement("div");
            code.className = "lesson-code";
            code.textContent = item.lesson;
            const title = document.createElement("div");
            title.className = "lesson-title";
            title.textContent = item.title;
            card.append(code, title);
            return card;
        }
        function renderGroups(lessons) {
            if (!lessons.length) {
                const empty = document.createElement("div");
                empty.className = "empty";
                empty.textContent = "\u627e\u4e0d\u5230\u7b26\u5408\u689d\u4ef6\u7684\u8ab2\u7a0b";
                lessonGroups.replaceChildren(empty);
                return;
            }
            const grouped = new Map();
            lessons.forEach(item => {
                if (!grouped.has(item.grade)) grouped.set(item.grade, []);
                grouped.get(item.grade).push(item);
            });
            const sections = Array.from(grouped.entries()).map(([grade, items]) => {
                const section = document.createElement("section");
                section.className = "group";
                const title = document.createElement("h2");
                title.className = "group-title";
                title.innerHTML = `${grade}<span>${items.length} \u8ab2</span>`;
                const grid = document.createElement("div");
                grid.className = "lesson-grid";
                grid.append(...items.map(renderLessonCard));
                section.append(title, grid);
                return section;
            });
            lessonGroups.replaceChildren(...sections);
        }
        function render() {
            renderFilters();
            const lessons = filterLessons();
            visibleCount.textContent = lessons.length;
            renderGroups(lessons);
        }
        searchInput.addEventListener("input", event => {
            state.query = event.target.value;
            render();
        });
        render();
    </script>
</body>
</html>
